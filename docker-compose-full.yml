version: "3.8"

services:
  tingfeng-agent:
    build: ./tingfeng-agent
    image: io.github.tingfeng/tingfeng-agent:0.1.0
    container_name: tingfeng-agent
    ports:
      - "8081:8081"
    environment:
      - AI_API_KEY=${AI_API_KEY}
      - REDIS_HOST=${REDIS_HOST:-redis-host}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - MYSQL_HOST=${MYSQL_HOST:-mysql-host}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - ALERT_ENABLED=${ALERT_ENABLED:-true}
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: tingfeng-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro

  alertmanager:
    image: prom/alertmanager:latest
    container_name: tingfeng-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
