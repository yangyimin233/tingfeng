server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: tingfeng-agent

tingfeng:
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:123456}
    database: ${REDIS_DATABASE:1}
  llm:
    api-key: ${AI_API_KEY}
    base-url: ${AI_BASE_URL:https://api.deepseek.com}
    model-name: ${AI_MODEL:deepseek-v4-flash}
  memory:
    ttl-minutes: ${MEMORY_TTL_MINUTES:30}
  mysql:
    host: ${MYSQL_HOST:localhost}
    port: ${MYSQL_PORT:3306}
    user: ${MYSQL_USER:root}
    pass: ${MYSQL_PASS:1234}
    db: ${MYSQL_DB:}
  executor:
    # cloud = 云端 DeepSeek, local = 本地 Ollama
    provider: ${EXECUTOR_PROVIDER:cloud}
    # 单任务超时(秒), 本地模型建议 >= 120
    timeout-seconds: ${EXECUTOR_TIMEOUT_SECONDS:60}
    # Planner 上下文注入的探针快照条数
    snapshot-context-size: ${SNAPSHOT_CONTEXT_SIZE:10}
  alert:
    # 是否启用告警 Webhook 接收 (Prometheus Alertmanager 回调)
    enabled: ${ALERT_ENABLED:true}
    # 告警批处理窗口(秒), 窗口内收到的多条告警打包一次诊断; 设为 0 则收到即查
    batch-window-seconds: ${ALERT_BATCH_WINDOW:30}
    # 缓冲池上限, 超过此数量立即强制消费, 防止告警风暴打爆内存
    max-batch-size: ${ALERT_MAX_BATCH:100}
    feishu:
      # 飞书自定义机器人 Webhook 地址
      webhook-url: ${FEISHU_WEBHOOK_URL:https://open.feishu.cn/open-apis/bot/v2/hook/80d92567-9d08-4ecb-b719-1a416be9a889}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434/v1}
    model-name: ${OLLAMA_MODEL:deepseek-r1:8b}
    embedding-model: ${OLLAMA_EMBEDDING_MODEL:bge-m3}
  persistence:
    url: jdbc:mysql://localhost:3306/tingfeng_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASS:1234}


logging:
  level:
    dev.langchain4j.mcp: TRACE
    dev.langchain4j: DEBUG
