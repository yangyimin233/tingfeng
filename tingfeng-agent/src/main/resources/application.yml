server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: tingfeng-agent
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      database: ${REDIS_DATABASE:1}

tingfeng:
  llm:
    api-key: ${AI_API_KEY}
    base-url: ${AI_BASE_URL:https://api.deepseek.com}
    model-name: ${AI_MODEL:deepseek-v4-flash}
  memory:
    ttl-minutes: ${MEMORY_TTL_MINUTES:30}
  mysql:
    host: ${MYSQL_HOST:localhost}
    port: ${MYSQL_PORT:3306}
    user: ${MYSQL_USER:root}
    pass: ${MYSQL_PASS:1234}
    db: ${MYSQL_DB:}
  executor:
    # cloud = 云端 DeepSeek, local = 本地 Ollama
    provider: ${EXECUTOR_PROVIDER:cloud}
    # 单任务超时(秒), 本地模型建议 >= 120
    timeout-seconds: ${EXECUTOR_TIMEOUT_SECONDS:60}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434/v1}
    model-name: ${OLLAMA_MODEL:deepseek-r1:8b}
    embedding-model: ${OLLAMA_EMBEDDING_MODEL:bge-m3}

logging:
  level:
    dev.langchain4j.mcp: TRACE
    dev.langchain4j: DEBUG
