<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TingFeng 听风 · AIOps 控制面板</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a1f2e;
    --border: #2a3040;
    --text: #c8d0dc;
    --dim: #6b7280;
    --accent: #60a5fa;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --user-bubble: #1d4ed8;
    --agent-bubble: #1e293b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; height: 100vh; overflow: hidden;
  }

  /* ── Sidebar ── */
  aside {
    width: 260px; background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  aside header {
    padding: 16px; border-bottom: 1px solid var(--border);
  }
  aside header .logo-row { display: flex; align-items: center; gap: 12px; }
  aside header .logo {
    width: 36px; height: 36px; background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: #fff;
  }
  aside header h1 { font-size: 18px; font-weight: 600; }
  aside header .sub { font-size: 11px; color: var(--dim); display: block; }

  /* Mode switch */
  .mode-switch {
    display: flex; background: #0f1419; border-radius: 6px; padding: 3px;
    margin-top: 10px;
  }
  .mode-switch button {
    flex: 1; padding: 6px 8px; border: none; border-radius: 4px;
    font-size: 11px; cursor: pointer; transition: all .2s;
    background: transparent; color: var(--dim);
  }
  .mode-switch button.active {
    background: var(--accent); color: #fff; font-weight: 600;
  }
  .mode-switch button.pipeline-active {
    background: var(--accent2); color: #fff; font-weight: 600;
  }

  aside nav { padding: 12px; flex: 1; overflow-y: auto; }
  aside nav .section { font-size: 10px; text-transform: uppercase; color: var(--dim); padding: 12px 8px 6px; letter-spacing: 1px; }
  aside nav button {
    width: 100%; text-align: left; padding: 10px 12px; border-radius: 6px;
    border: none; background: transparent; color: var(--text); font-size: 13px;
    cursor: pointer; margin-bottom: 2px; transition: background .15s;
  }
  aside nav button:hover { background: #262d3c; }
  aside nav button .icon { margin-right: 8px; }
  aside nav .quick-group { display: none; }
  aside nav .quick-group.show { display: block; }
  aside footer {
    padding: 12px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--dim); text-align: center;
  }

  /* ── Center ── */
  section.center { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  section.center > header {
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; font-size: 13px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .status-dot.off { background: var(--red); }
  .status-dot.pipeline { background: var(--accent2); }
  .mode-badge {
    padding: 2px 10px; border-radius: 10px; font-size: 10px; font-weight: 600;
    margin-left: 8px;
  }
  .mode-badge.simple { background: #1e3a5f; color: var(--accent); }
  .mode-badge.pipeline { background: #2d1b5e; color: var(--accent2); }

  #messages {
    flex: 1; overflow-y: auto; padding: 20px 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .msg {
    max-width: 85%; padding: 14px 18px; border-radius: 12px;
    font-size: 13.5px; line-height: 1.7; word-wrap: break-word;
  }
  .msg.user { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 4px; }
  .msg.agent { align-self: flex-start; background: var(--agent-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.agent h1, .msg.agent h2, .msg.agent h3 { margin: 12px 0 6px; font-size: 15px; color: #fff; }
  .msg.agent h2 { font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .msg.agent table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
  .msg.agent th, .msg.agent td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
  .msg.agent th { background: #262d3c; font-weight: 600; }
  .msg.agent code { background: #262d3c; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
  .msg.agent strong { color: var(--accent); }
  .msg.agent blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--dim); margin: 8px 0; }
  .msg.loading { color: var(--dim); font-style: italic; }
  .msg.loading::after { content: '...'; animation: dots 1.5s infinite; }
  @keyframes dots { 0%,20%{content:'.'}40%{content:'..'}60%,100%{content:'...'} }

  .msg.system-msg {
    align-self: center; background: transparent; border: 1px dashed var(--border);
    color: var(--dim); font-size: 11px; max-width: 90%; padding: 6px 14px;
    border-radius: 16px;
  }

  #input-area {
    padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px;
  }
  #input-area input {
    flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); font-size: 13px; outline: none;
  }
  #input-area input:focus { border-color: var(--accent); }
  #input-area.pipeline-input input:focus { border-color: var(--accent2); }
  #input-area button {
    padding: 12px 24px; border-radius: 8px; border: none;
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  #input-area.pipeline-input button { background: var(--accent2); }
  #input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Right panel: Snapshots ── */
  aside.snapshots-panel {
    width: 320px; background: var(--panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  aside.snapshots-panel header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  aside.snapshots-panel header h3 { font-size: 14px; }
  aside.snapshots-panel header .count { font-size: 11px; color: var(--dim); }
  #snapshot-list {
    flex: 1; overflow-y: auto; padding: 12px;
  }
  .snapshot-card {
    background: #141923; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; margin-bottom: 8px; font-size: 12px;
  }
  .snapshot-card .method { font-weight: 600; color: #fff; margin-bottom: 4px; word-break: break-all; }
  .snapshot-card .row { margin: 3px 0; color: var(--dim); font-size: 11px; }
  .snapshot-card .row strong { color: var(--text); }
  .snapshot-card .meta { display: flex; gap: 12px; margin-top: 6px; font-size: 11px; color: var(--dim); }
  .snapshot-card .badge {
    padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600;
  }
  .badge.ok { background: #064e3b; color: var(--green); }
  .badge.err { background: #7f1d1d; color: var(--red); }
  .snapshot-card .detail {
    margin-top: 6px; padding: 6px 8px; background: #1c1917; border-radius: 4px;
    font-size: 11px; word-break: break-all; max-height: 80px; overflow-y: auto;
  }
  .snapshot-card .detail.err { color: var(--red); }
  .snapshot-card .detail.ret { color: var(--green); }
  .empty-state { text-align: center; color: var(--dim); padding: 40px 20px; font-size: 13px; }

  /* ── Actions Panel ── */
  #actions-panel {
    border-top: 1px solid var(--border); padding: 16px 24px; display: none;
  }
  #actions-panel.show { display: block; }
  #actions-panel h3 { font-size: 13px; margin-bottom: 12px; color: var(--accent2); }
  .action-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid #1a2030; font-size: 12px;
  }
  .action-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent2); }
  .risk-badge {
    padding: 1px 8px; border-radius: 8px; font-size: 10px; font-weight: 600; flex-shrink: 0;
  }
  .risk-badge.safe { background: #064e3b; color: var(--green); }
  .risk-badge.caution { background: #78350f; color: var(--yellow); }
  .risk-badge.dangerous { background: #7f1d1d; color: var(--red); }
  .action-item .warn { font-size: 10px; color: var(--red); margin-left: auto; }
  .action-buttons { display: flex; gap: 8px; margin-top: 12px; }
  .action-buttons button {
    flex: 1; padding: 10px 16px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  #execute-btn { background: var(--accent2); color: #fff; }
  #dismiss-btn { background: #262d3c; color: #94a3b8; border: 1px solid var(--border); }
  #dismiss-btn:hover:not(:disabled) { background: #303a4c; color: #fff; }
  #execute-btn:disabled, #dismiss-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .execute-result { font-size: 12px; margin-top: 4px; padding: 4px 8px; border-radius: 4px; }
  .execute-result.ok { color: var(--green); }
  .execute-result.err { color: var(--red); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<aside>
  <header>
    <div class="logo-row">
      <div class="logo">听</div>
      <div><h1>TingFeng</h1><span class="sub">AIOps 控制面板</span></div>
    </div>
    <div class="mode-switch">
      <button id="btn-simple" class="active" onclick="switchMode('simple')"> 简单 Chat</button>
      <button id="btn-pipeline" onclick="switchMode('pipeline')"> Pipeline</button>
    </div>
  </header>
  <nav>
    <!-- Simple mode quick actions -->
    <div id="quick-simple" class="quick-group show">
      <div class="section">快捷诊断</div>
      <button onclick="send('检查 Redis 健康状况')">🩺 Redis 健康检查</button>
      <button onclick="send('帮我看看 MySQL 慢查询情况')">🐢 MySQL 慢查询</button>
      <button onclick="send('检查 MySQL 当前连接数和连接状态')">🔗 MySQL 连接诊断</button>
      <button onclick="send('分析 Redis 内存使用情况和潜在风险')">💾 Redis 内存分析</button>
      <button onclick="send('给全部组件做一个全面的体检报告')">📋 全面体检</button>
    </div>
    <!-- Pipeline mode quick actions -->
    <div id="quick-pipeline" class="quick-group">
      <div class="section">Pipeline 深度诊断</div>
      <button onclick="send('帮我做一次 MySQL 全链路健康检查')">🏥 MySQL 深度体检</button>
      <button onclick="send('Redis 内存持续增长，帮我排查原因')">📈 Redis 内存排查</button>
      <button onclick="send('MySQL 查询突然变慢，帮我诊断根因')">🔍 MySQL 慢查询根因</button>
      <button onclick="send('数据库连接池告警，帮我分析是否存在连接泄漏')">⚠️ 连接泄漏分析</button>
      <button onclick="send('对系统做一次完整的运行体检并给出优化建议')">📊 全栈运行体检</button>
    </div>
    <div class="section">会话</div>
    <button onclick="newSession()">🆕 新建会话</button>
    <div style="padding:8px 12px;font-size:10px;color:var(--dim);word-break:break-all;text-align:center" id="session-id-display"></div>
  </nav>
  <footer>Powered by DeepSeek & LangChain4j</footer>
</aside>

<section class="center">
  <header>
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Agent 就绪</span>
    <span class="mode-badge simple" id="mode-badge">简单模式</span>
  </header>

  <div id="messages">
    <div class="msg agent">
      <strong>听风 TingFeng</strong> 已就绪。<br>
      左侧切换 <strong>简单 Chat</strong> / <strong>Pipeline 深度诊断</strong> 两种模式。<br>
      Pipeline 模式会自动规划 → 执行 → 汇总，适合复杂问题排查。
    </div>
  </div>

  <div id="input-area">
    <input id="msg-input" type="text" placeholder="输入运维诊断问题..."
           onkeydown="if(event.key==='Enter')send()">
    <button id="send-btn" onclick="send()">发送</button>
  </div>
</section>

<!-- 可执行操作面板 -->
<section id="actions-panel">
  <h3> 可执行操作</h3>
  <div id="actions-list"></div>
  <div class="action-buttons">
    <button id="dismiss-btn" onclick="dismissActions()">忽略, 不需要执行</button>
    <button id="execute-btn" onclick="executeApproved()">执行选中操作</button>
  </div>
</section>

<!-- 右侧：探针上报面板 -->
<aside class="snapshots-panel">
  <header>
    <h3>探针上报</h3>
    <span class="count" id="snapshot-count">最近 50 条</span>
  </header>
  <div id="snapshot-list">
    <div class="empty-state">等待业务方法上报中...</div>
  </div>
</aside>

<script>
const API_SIMPLE = '/tingfeng/chat';
const API_PIPELINE = '/diagnose/chat';
const API_PIPELINE_SSE = '/diagnose/stream';
let currentMode = sessionStorage.getItem('tingfeng-mode') || 'simple';

const msgs = document.getElementById('messages');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const inputArea = document.getElementById('input-area');
const modeBadge = document.getElementById('mode-badge');

let sessionId = sessionStorage.getItem('tingfeng-sid') || '';
function showSessionId() {
  var el = document.getElementById('session-id-display');
  el.textContent = sessionId ? '会话: ' + sessionId.substring(0, 12) + '...' : '(无会话)';
}
showSessionId();

function newSession() {
  sessionId = '';
  sessionStorage.removeItem('tingfeng-sid');
  msgs.innerHTML = '<div class="msg agent"><strong>新会话已开始。</strong></div>';
  showSessionId();
}

function switchMode(mode) {
  currentMode = mode;
  sessionStorage.setItem('tingfeng-mode', mode);
  document.getElementById('btn-simple').className = mode === 'simple' ? 'active' : '';
  document.getElementById('btn-pipeline').className = mode === 'pipeline' ? 'pipeline-active' : '';
  document.getElementById('quick-simple').classList.toggle('show', mode === 'simple');
  document.getElementById('quick-pipeline').classList.toggle('show', mode === 'pipeline');
  inputArea.className = mode === 'pipeline' ? 'pipeline-input' : '';
  modeBadge.textContent = mode === 'pipeline' ? 'Pipeline 模式' : '简单模式';
  modeBadge.className = 'mode-badge ' + mode;
  statusDot.className = 'status-dot ' + (mode === 'pipeline' ? 'pipeline' : '');
}
switchMode(currentMode);

function scrollBottom() { msgs.scrollTop = msgs.scrollHeight; }

function addMsg(role, html, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + role + (cls ? ' ' + cls : '');
  if (html) div.innerHTML = html;
  msgs.appendChild(div);
  scrollBottom();
  return div;
}

function updateStatus(state) {
  if (state === 'thinking') {
    statusDot.className = 'status-dot ' + (currentMode === 'pipeline' ? 'pipeline' : '') + ' off';
    statusText.textContent = currentMode === 'pipeline' ? 'Pipeline 诊断中...' : '诊断中...';
  } else if (state === 'error') {
    statusDot.className = 'status-dot off'; statusText.textContent = '连接异常';
  } else {
    statusDot.className = 'status-dot ' + (currentMode === 'pipeline' ? 'pipeline' : '');
    statusText.textContent = 'Agent 就绪';
  }
}

async function send(msg) {
  msg = msg || input.value.trim();
  if (!msg) return;
  input.value = '';
  sendBtn.disabled = true;
  addMsg('user', escapeHtml(msg));
  updateStatus('thinking');

  if (currentMode === 'pipeline') {
    await sendPipelineSSE(msg);
  } else {
    await sendSimple(msg);
  }
  sendBtn.disabled = false;
  input.focus();
}

// ── 简单 Chat 模式 (fetch) ──
async function sendSimple(msg) {
  const loadingDiv = addMsg('agent', 'Agent 分析中', 'loading');
  try {
    var url = API_SIMPLE + '?msg=' + encodeURIComponent(msg);
    if (sessionId) url += '&sessionId=' + encodeURIComponent(sessionId);
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
    var sid = res.headers.get('X-Session-Id');
    if (sid) { sessionId = sid; sessionStorage.setItem('tingfeng-sid', sid); showSessionId(); }
    loadingDiv.remove();
    addMsg('agent', marked.parse(await res.text()));
    updateStatus('ok');
  } catch (e) {
    loadingDiv.remove();
    addMsg('agent', '<span style="color:var(--red)">请求失败: ' + escapeHtml(e.message) + '</span>');
    updateStatus('error');
  }
}

// ── Pipeline SSE 流式模式 ──
function sendPipelineSSE(msg) {
  return new Promise((resolve) => {
    const statusDiv = addMsg('agent', '', 'system-msg');
    const planDiv = addMsg('agent', '', 'system-msg');
    let reportDiv = null;
    let taskDivs = [];

    var url = API_PIPELINE_SSE + '?msg=' + encodeURIComponent(msg);
    if (sessionId) url += '&sessionId=' + encodeURIComponent(sessionId);
    const es = new EventSource(url);

    es.addEventListener('phase', e => {
      statusDiv.innerHTML = ' ' + escapeHtml(e.data);
      scrollBottom();
    });

    es.addEventListener('plan', e => {
      try {
        const todos = JSON.parse(e.data);
        planDiv.innerHTML = '<strong>排查计划 (' + todos.length + ' 项):</strong><br>' +
          todos.map((t, i) => '  ' + (i + 1) + '. ' + escapeHtml(t)).join('<br>');
      } catch (_) {
        planDiv.textContent = '排查计划已生成';
      }
      scrollBottom();
    });

    es.addEventListener('task-start', e => {
      try {
        const d = JSON.parse(e.data);
        const div = addMsg('agent',
          '<strong>[' + d.index + '/' + d.total + ']</strong> ' + escapeHtml(d.title) + '...',
          'system-msg');
        taskDivs[d.index - 1] = div;
      } catch (_) {}
    });

    es.addEventListener('task-done', e => {
      try {
        const d = JSON.parse(e.data);
        if (taskDivs[d.index - 1]) {
          taskDivs[d.index - 1].innerHTML += ' <span style="color:var(--green)">OK</span>';
        }
      } catch (_) {}
    });

    es.addEventListener('task-error', e => {
      try {
        const d = JSON.parse(e.data);
        if (taskDivs[d.index - 1]) {
          taskDivs[d.index - 1].innerHTML +=
            ' <span style="color:var(--red)">FAILED: ' + escapeHtml(d.error) + '</span>';
        }
      } catch (_) {}
    });

    es.addEventListener('report', e => {
      statusDiv.innerHTML = ' 汇总完成';
      msgs.querySelectorAll('.system-msg').forEach(el => el.remove());
      reportDiv = addMsg('agent', marked.parse(e.data));
      updateStatus('ok');
      es.close();
      resolve();
    });

    es.addEventListener('actions', e => {
      try {
        const { actions } = JSON.parse(e.data);
        if (actions && actions.length > 0) {
          renderActions(actions);
        }
      } catch (_) {}
    });

    es.addEventListener('error', e => {
      msgs.querySelectorAll('.system-msg, .loading').forEach(el => el.remove());
      try {
        addMsg('agent', '<span style="color:var(--red)">诊断失败: ' + escapeHtml(JSON.stringify(e.data || '连接中断')) + '</span>');
      } catch (_) {
        addMsg('agent', '<span style="color:var(--red)">诊断失败: 连接中断</span>');
      }
      updateStatus('error');
      es.close();
      resolve();
    });

    // Fallback: close after 5 min
    setTimeout(() => { es.close(); resolve(); }, 300000);
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 可执行操作 ──

let pendingActions = [];

function renderActions(actions) {
  pendingActions = actions;
  const panel = document.getElementById('actions-panel');
  const listEl = document.getElementById('actions-list');
  const btn = document.getElementById('execute-btn');
  const dismissBtn = document.getElementById('dismiss-btn');
  panel.classList.add('show');

  listEl.innerHTML = actions.map(function(a) {
    const riskLabel = a.risk || 'safe';
    const checked = riskLabel === 'safe' ? 'checked' : '';
    const warn = riskLabel === 'dangerous'
      ? '<span class="warn"> 不可逆, 需二次确认</span>' : '';
    return '<div class="action-item">'
      + '<input type="checkbox" id="' + a.id + '" ' + checked + '>'
      + '<span class="risk-badge ' + riskLabel + '">' + riskLabel + '</span>'
      + '<label for="' + a.id + '">' + escapeHtml(a.desc) + '</label>'
      + warn + '</div>';
  }).join('');

  btn.disabled = false;
  btn.textContent = '执行选中操作';
  dismissBtn.disabled = false;
  dismissBtn.removeAttribute('disabled');
  dismissBtn.style.cursor = 'pointer';
  panel.scrollIntoView({ behavior: 'smooth' });
}

function dismissActions() {
  var panel = document.getElementById('actions-panel');
  panel.classList.remove('show');
  panel.style.display = 'none';
  pendingActions = [];
  updateStatus('ok');
}

async function executeApproved() {
  var btn = document.getElementById('execute-btn');
  var dismissBtn = document.getElementById('dismiss-btn');
  btn.disabled = true;
  dismissBtn.disabled = true;
  btn.textContent = '执行中...';

  const checkboxes = document.querySelectorAll('#actions-list input[type=checkbox]:checked');
  for (const cb of checkboxes) {
    const action = pendingActions.find(function(a) { return a.id === cb.id; });
    if (!action) continue;
    const itemEl = cb.closest('.action-item');
    try {
      const res = await fetch('/admin/tools/execute', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          client: action.client,
          tool: action.tool,
          args: action.args
        })
      });
      const json = await res.json();
      const resultEl = document.createElement('div');
      resultEl.className = 'execute-result ' + (json.ok ? 'ok' : 'err');
      resultEl.textContent = json.ok ? ' OK: ' + json.output : ' ERROR: ' + (json.error || '');
      itemEl.appendChild(resultEl);
    } catch (e) {
      const resultEl = document.createElement('div');
      resultEl.className = 'execute-result err';
      resultEl.textContent = ' 网络错误: ' + e.message;
      itemEl.appendChild(resultEl);
    }
  }
  btn.disabled = false;
  btn.textContent = '执行选中操作 (完成)';
}

// ── 探针上报轮询 ──
function fmtTime(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':'
       + d.getMinutes().toString().padStart(2,'0') + ':'
       + d.getSeconds().toString().padStart(2,'0');
}

function renderSnapshots(list) {
  const container = document.getElementById('snapshot-list');
  document.getElementById('snapshot-count').textContent = '最近 ' + list.length + ' 条';
  if (!list.length) {
    container.innerHTML = '<div class="empty-state">等待业务方法上报中...</div>';
    return;
  }
  container.innerHTML = list.map(function(s) {
    var ok = s.success;
    var html = '<div class="snapshot-card">';
    html += '<div class="method">' + escapeHtml(s.methodName || '?') + '</div>';
    html += '<div class="meta">';
    html += '<span class="badge ' + (ok ? 'ok' : 'err') + '">' + (ok ? 'OK' : 'FAIL') + '</span>';
    html += '<span>' + (s.rt || 0) + 'ms</span>';
    html += '<span>' + fmtTime(s.timestamp || 0) + '</span>';
    html += '</div>';
    if (s.returnValue) {
      html += '<div class="detail ret">' + escapeHtml(s.returnValue) + '</div>';
    }
    if (!ok && s.errorMsg) {
      html += '<div class="detail err">' + escapeHtml(s.errorMsg) + '</div>';
    }
    html += '</div>';
    return html;
  }).join('');
}

async function pollSnapshots() {
  try {
    var res = await fetch('/tingfeng/snapshots');
    if (res.ok) renderSnapshots(await res.json());
  } catch (e) { /* ignore */ }
}

setInterval(pollSnapshots, 3000);
pollSnapshots();
</script>
